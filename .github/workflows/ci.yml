name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore mvcApp.slnx

      - name: Build
        run: dotnet build mvcApp.slnx --no-restore

      - name: Run Tests
        run: dotnet test mvcApp.slnx --no-build --verbosity normal